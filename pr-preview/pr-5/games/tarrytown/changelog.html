<!DOCTYPE html>
<!-- Template: build.py copies this into each game folder as changelog.html, so a
     game's changelog lives right next to the game at games/<slug>/changelog.html.
     It reads ./game.json and ./changelog.md from its own folder; paths are
     relative to the game folder (../../ is the library root). -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changelog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <header class="site-head">
    <div class="logo"><a href="../../">the <span class="mark">playground</span></a></div>
    <nav class="topnav">
      <a href="./">Play</a>
      <a href="../../">All games</a>
    </nav>
  </header>

  <main>
    <section class="changelog-list">
      <article class="cl-game">
        <h2 id="cl-title">Changelog</h2>
        <p class="cl-sub" id="cl-sub"></p>
        <div class="cl-body" id="cl-body"><p class="loading">Loading…</p></div>
      </article>
    </section>
  </main>

<script>
Promise.all([
  fetch('game.json').then(r => r.ok ? r.json() : {}).catch(() => ({})),
  fetch('changelog.md').then(r => r.ok ? r.text() : '').catch(() => ''),
]).then(([meta, md]) => {
  if (meta.title) {
    document.getElementById('cl-title').textContent = meta.title + ' changelog';
    document.title = meta.title + ' changelog';
  }
  document.getElementById('cl-sub').textContent = meta.tagline || '';
  document.getElementById('cl-body').innerHTML = md.trim()
    ? marked.parse(md)
    : '<p class="loading">No changelog entries yet.</p>';
});
</script>
</body>
</html>
