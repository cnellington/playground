<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZOOMIES — outrun the housemate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241f1d;
    --wall:#efe2c4;
    --rust:#b86a2c;
    --rust-dk:#8a4d1c;
    --cream:#f3ebda;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(130% 100% at 50% -10%, #fbf3df 0%, #e7d6b3 55%, #d2bd92 100%);
    font-family:'VT323',monospace;
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100%;
    padding:14px 10px 24px;
    -webkit-user-select:none;user-select:none;
    image-rendering:pixelated;
  }
  .wrap{display:flex;flex-direction:column;align-items:center;}
  h1.title{
    font-family:'Silkscreen',monospace;font-weight:700;
    font-size:clamp(18px,5vw,28px);
    color:var(--rust);
    text-shadow:2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,.16);
    letter-spacing:2px;text-align:center;margin-bottom:2px;
  }
  .subtitle{font-size:19px;opacity:.78;letter-spacing:.5px;margin-bottom:10px;text-align:center;}
  .frame{
    position:relative;
    border:6px solid var(--ink);border-radius:14px;
    background:#241f1d;
    box-shadow:0 12px 0 rgba(0,0,0,.18), 0 2px 0 #fff inset;
    padding:8px;
    touch-action:none;
  }
  .screen{
    position:relative;
    width:360px;max-width:92vw;
    aspect-ratio:360/540;
    border-radius:7px;overflow:hidden;background:#000;
    image-rendering:pixelated;
  }
  canvas#game{width:100%;height:100%;display:block;image-rendering:pixelated;}

  .overlay{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:20px;color:var(--cream);
    background:linear-gradient(rgba(28,22,18,.30),rgba(28,22,18,.66));
  }
  .overlay.show{display:flex;}
  .overlay h2{
    font-family:'Silkscreen';font-size:22px;color:#ffd27a;
    text-shadow:2px 2px 0 #000;margin-bottom:12px;letter-spacing:1px;
  }
  .overlay p{font-size:21px;line-height:1.25;margin-bottom:6px;text-shadow:1px 1px 0 #000;}
  .overlay .big{font-family:'Silkscreen';font-size:30px;color:#fff;margin:2px 0;text-shadow:2px 2px 0 #000;}
  .overlay .hint{margin-top:14px;font-size:20px;opacity:.92;animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.45;}50%{opacity:1;}}
  .key{
    font-family:'Silkscreen';font-size:11px;color:var(--ink);background:var(--cream);
    border:2px solid var(--ink);border-bottom-width:4px;border-radius:6px;
    padding:3px 7px;display:inline-block;
  }
  .mute{
    position:absolute;top:12px;right:12px;z-index:5;
    font-size:18px;line-height:1;cursor:pointer;
    background:rgba(36,31,29,.55);border:2px solid rgba(255,255,255,.25);
    border-radius:8px;padding:5px 7px;color:#fff;
  }
  .foot{margin-top:12px;font-size:18px;opacity:.7;text-align:center;letter-spacing:.5px;}
  .foot b{color:var(--rust-dk);font-weight:400;}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">ZOOMIES</h1>
  <div class="subtitle">outrun the housemate, mind the furniture</div>
  <div class="frame" id="frame">
    <div class="screen">
      <canvas id="game" width="360" height="540"></canvas>
      <div class="mute" id="mute" title="sound">🔊</div>
      <div class="overlay show" id="ready">
        <h2>ZOOMIES</h2>
        <p>The tortie has the zoomies.</p>
        <p>Hop the junk. Don't get caught.</p>
        <div class="hint"><span class="key">SPACE</span> / tap to hop</div>
      </div>
      <div class="overlay" id="dead">
        <h2 id="deadTitle">CAUGHT!</h2>
        <p>cleared</p>
        <div class="big" id="finalScore">0</div>
        <p>best <span id="bestScore">0</span></p>
        <div class="hint"><span class="key">SPACE</span> / tap to run again</div>
      </div>
    </div>
  </div>
  <div class="foot">one button &nbsp;·&nbsp; <b>space</b> or tap to hop</div>
</div>

<script>
"use strict";
(() => {
  // ---------- canvas ----------
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;       // logical pixels (360 x 540)
  ctx.imageSmoothingEnabled = false;

  // ---------- tunables ----------
  const FLOOR_H   = 84;                     // floor strip at the bottom
  const GROUND_Y  = H - FLOOR_H;            // y where the floor begins
  const BIRD_X    = 124;                    // tortie's fixed horizontal spot
  const GRAV      = 1750;                   // px/s^2
  const FLAP_V    = -470;                   // hop impulse
  const MAX_V     = 640;
  const OB_W      = 64;                     // furniture column width
  const GAP0      = 168;                    // starting gap
  const SPEED0    = 138;                    // starting scroll speed
  const SPAWN_DX  = 208;                    // horizontal spacing between obstacles

  // ---------- state ----------
  let state = 'ready';                      // ready | play | dead
  let birdY, birdV, birdRot, t, scrollX;
  let obstacles, score, best, speed;
  let spawnAcc;                             // distance since last spawn
  let deadAt, deathRot, deathV;
  let siameseY, lungeX;                     // pursuer

  best = +(localStorage.getItem('zoomies-best') || 0);

  // ---------- audio (WebAudio, no files) ----------
  let actx = null, muted = (localStorage.getItem('zoomies-muted') === '1');
  const muteBtn = document.getElementById('mute');
  muteBtn.textContent = muted ? '🔇' : '🔊';
  function ensureAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
  function beep(freq, dur, type='square', vol=0.16, slideTo=null){
    if(muted || !actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, actx.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + dur);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  }
  const sndFlap  = () => beep(540, 0.09, 'square', 0.12, 760);
  const sndScore = () => { beep(880, 0.07, 'square', 0.13); setTimeout(()=>beep(1320,0.09,'square',0.12),60); };
  const sndCrash = () => { beep(180, 0.18, 'sawtooth', 0.20, 70); };
  const sndCaught= () => { beep(420, 0.5, 'sawtooth', 0.18, 90); };
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted; localStorage.setItem('zoomies-muted', muted ? '1':'0');
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  // ---------- sprites ----------
  // Each sprite is baked once onto a tiny offscreen canvas (1 unit = 1 pixel),
  // then blitted scaled with smoothing off so it stays crisp pixel art.
  function makeCanvas(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }
  function bake(gw, gh, layers){
    const c = makeCanvas(gw, gh), g = c.getContext('2d');
    for(const L of layers){
      g.fillStyle = L.c;
      for(const s of L.s) g.fillRect(s[1], s[0], s[2]-s[1]+1, 1);
    }
    return c;
  }

  // palettes
  const K='#211c1b', KD='#141010', GIN='#b4682a', GINL='#d68f4f', WHT='#f2ead9',
        EYE='#a8d24a', PUP='#1c1c10', PNK='#d98c97';
  const CRM='#efe6d2', CRD='#d8c8ab', PNT='#7d6f63', PNTD='#5d5046', BLU='#7cc0e6', BLUD='#2c5b76';

  // ----- black tortie (player), facing right, leaping -----
  // silhouette
  const TORTIE_BODY = [
    // ears
    [0,16,17],[0,21,22],
    [1,15,18],[1,20,23],
    // head
    [2,15,24],[3,14,25],[4,13,26],[5,13,26],[6,14,26],
    // neck/jaw
    [7,8,25],
    // body
    [8,4,24],[9,3,24],[10,3,23],[11,4,22],[12,5,21],
    // tail (curls up over the back, at the left)
    [7,1,3],[6,0,2],[5,0,2],[4,1,3],[3,2,4],[2,3,5],
  ];
  const TORTIE_LEGS_A = [
    [13,5,8],[13,16,20],[14,5,8],[14,16,20],[15,5,7],[15,17,20],[16,4,8],[16,16,21],
  ];
  const TORTIE_LEGS_B = [
    [13,6,9],[13,15,19],[14,6,9],[14,15,19],[15,7,9],[15,15,18],[16,6,10],[16,15,20],
  ];
  const TORTIE_GINGER = [
    [8,4,9],[9,3,8],[10,4,8],[11,5,9],         // haunch
    [8,14,18],[9,13,18],[10,13,17],            // back stripe
    [4,14,17],[5,14,16],[1,15,16],             // cheek + ear
    [6,0,1],[4,2,3],                           // tail bands
  ];
  const TORTIE_GINGERL = [ [9,5,6],[10,14,15],[5,15,15],[10,5,6] ];
  const TORTIE_WHITE = [ [7,19,23],[8,20,23],[9,21,23] ];   // chest bib
  const TORTIE_FACE = (legs) => [
    {c:K,  s:TORTIE_BODY},
    {c:K,  s:legs},
    {c:GIN,s:TORTIE_GINGER},
    {c:GINL,s:TORTIE_GINGERL},
    {c:WHT,s:TORTIE_WHITE},
    {c:EYE,s:[[4,21,23],[5,22,23]]},
    {c:PUP,s:[[4,22,22]]},
    {c:PNK,s:[[6,25,26]]},
    {c:PNK,s:[[1,16,16],[1,21,21]]},           // inner ears
  ];
  const tortieA = bake(28,18, TORTIE_FACE(TORTIE_LEGS_A));
  const tortieB = bake(28,18, TORTIE_FACE(TORTIE_LEGS_B));

  // ----- lilac-point siamese (pursuer), facing right, galloping -----
  const SIAM_BODY = [
    // ears
    [2,19,20],[2,24,25],[3,18,21],[3,23,26],
    // head
    [4,18,27],[5,17,28],[6,16,28],[7,16,28],
    // neck/jaw
    [8,9,27],
    // body
    [9,5,26],[10,3,26],[11,2,25],[12,2,24],[13,3,23],
    // tail (long, sweeps up-left)
    [9,0,2],[8,0,2],[7,1,3],[6,2,4],[5,3,5],
  ];
  const SIAM_LEGS_A = [
    [14,3,7],[14,11,14],[14,18,22],
    [15,3,6],[15,11,13],[15,18,21],
    [16,2,6],[16,11,13],[16,18,21],
    [17,2,6],[17,11,14],[17,18,22],
  ];
  const SIAM_LEGS_B = [
    [14,4,8],[14,10,13],[14,17,21],
    [15,5,8],[15,10,12],[15,17,20],
    [16,5,9],[16,10,12],[16,17,20],
    [17,5,9],[17,10,13],[17,17,21],
  ];
  const SIAM_POINTS = [
    // ears
    [2,19,20],[2,24,25],[3,18,19],[3,25,26],
    // face mask (muzzle + brow)
    [5,24,28],[6,23,28],[7,22,28],[8,23,27],
    // tail tip
    [5,3,5],[6,2,4],
  ];
  const SIAM_POINT_LEGS_A = [ [16,2,6],[16,11,13],[16,18,21],[17,2,6],[17,11,14],[17,18,22] ];
  const SIAM_POINT_LEGS_B = [ [16,5,9],[16,10,12],[16,17,20],[17,5,9],[17,10,13],[17,17,21] ];
  const SIAM_FACE = (legs, plegs) => [
    {c:CRM, s:SIAM_BODY},
    {c:CRM, s:legs},
    {c:CRD, s:[[12,3,9],[13,4,10]]},          // belly shade
    {c:PNT, s:SIAM_POINTS},
    {c:PNT, s:plegs},
    {c:PNTD,s:[[7,26,28]]},                    // dark muzzle front
    {c:BLU, s:[[5,22,24],[6,22,23]]},          // big round blue eye
    {c:PUP, s:[[5,23,23]]},
    {c:PNK, s:[[7,27,28]]},
    {c:PNK, s:[[2,19,19],[2,24,24]]},          // inner ears
  ];
  const siamA = bake(30,20, SIAM_FACE(SIAM_LEGS_A, SIAM_POINT_LEGS_A));
  const siamB = bake(30,20, SIAM_FACE(SIAM_LEGS_B, SIAM_POINT_LEGS_B));

  function blit(spr, cx, cy, scale, rot, flip){
    ctx.save();
    ctx.translate(cx, cy);
    if(rot) ctx.rotate(rot);
    if(flip) ctx.scale(-1,1);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spr, -spr.width*scale/2, -spr.height*scale/2, spr.width*scale, spr.height*scale);
    ctx.restore();
  }
  const TSC = 2.0, SSC = 2.5;                  // sprite display scales
  const TORTIE_W = 28*TSC, TORTIE_H = 18*TSC;

  // ---------- bitmap score digits (3x5) ----------
  const DIGITS = {
    0:["111","101","101","101","111"],1:["010","110","010","010","111"],
    2:["111","001","111","100","111"],3:["111","001","111","001","111"],
    4:["101","101","111","001","001"],5:["111","100","111","001","111"],
    6:["111","100","111","101","111"],7:["111","001","010","010","010"],
    8:["111","101","111","101","111"],9:["111","101","111","001","111"],
  };
  function drawNumber(n, cx, topY, px){
    const str = String(n);
    const dw = 3*px, gap = px, total = str.length*dw + (str.length-1)*gap;
    let x = Math.round(cx - total/2);
    for(const ch of str){
      const rows = DIGITS[ch];
      for(let r=0;r<5;r++) for(let c=0;c<3;c++) if(rows[r][c]==='1'){
        ctx.fillStyle = '#000'; ctx.fillRect(x+c*px-1, topY+r*px-1, px+2, px+2); // outline
      }
      for(let r=0;r<5;r++) for(let c=0;c<3;c++) if(rows[r][c]==='1'){
        ctx.fillStyle = '#fff'; ctx.fillRect(x+c*px, topY+r*px, px, px);
      }
      x += dw + gap;
    }
  }

  // ---------- furniture obstacles ----------
  const BTYPES = ['boxes','books','plant','basket'];
  const TTYPES = ['shelf','lamp','curtain'];
  let rng = 1;                                 // tiny deterministic-ish PRNG seed
  function rand(){ rng = (rng*1103515245 + 12345) & 0x7fffffff; return rng / 0x7fffffff; }
  function pick(a){ return a[(rand()*a.length)|0]; }

  function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }

  // bottom furniture: fills the column from y0 down to GROUND_Y (cap at the top/gap end)
  function drawBottom(x, y0, type){
    const w = OB_W, h = GROUND_Y - y0;
    if(type==='boxes'){
      px(x,y0,w,h,'#c79a5e');
      px(x,y0,w,h-0,'#c79a5e');
      // box dividers
      for(let yy=y0+26; yy<GROUND_Y; yy+=30) px(x,yy,w,3,'#9c6f38');
      px(x,y0,w,4,'#a9763a');                 // top lid
      px(x+w/2-2,y0,4,h,'#a9763a');           // tape seam
      px(x+4,y0+8,w-8,3,'#e6c389');           // flap highlight
      px(x,y0,3,h,'#e6c389'); px(x+w-3,y0,3,h,'#9c6f38');
    } else if(type==='books'){
      const cols=['#b8453f','#3f72a6','#d8a93a','#5a8a51','#8a5a9c','#c97a3a'];
      let yy=y0;
      while(yy<GROUND_Y){
        const bh = 11 + ((rand()*9)|0);
        const col = cols[(rand()*cols.length)|0];
        px(x,yy,w,Math.min(bh,GROUND_Y-yy),col);
        px(x,yy,w,2, 'rgba(0,0,0,.18)');      // spine shade
        px(x+w-8,yy+3,3,Math.max(1,bh-6),'rgba(255,255,255,.30)'); // title tick
        yy += bh+1;
      }
      px(x,y0,w,3,'#cdb98c');
    } else if(type==='plant'){
      // terracotta pot at the bottom, foliage filling up to the cap
      const potH = Math.min(40, h);
      const potY = GROUND_Y - potH;
      px(x+4,potY,w-8,potH,'#c1693f');
      px(x+4,potY,w-8,6,'#a4502c');
      px(x+2,potY,w-4,5,'#d8804f');           // rim
      // leaves
      const leafTop = y0;
      px(x+6,leafTop,w-12,potY-leafTop+6,'#4f7f3a');
      for(let i=0;i<5;i++){
        const ly = leafTop + i*((potY-leafTop)/5);
        px(x+2,ly,10,7,'#5f9445'); px(x+w-12,ly+4,10,7,'#5f9445');
        px(x+w/2-5,ly-2,10,8,'#6fae50');
      }
      px(x+8,leafTop,w-16,4,'#7cbf5c');
    } else { // basket
      px(x+2,y0,w-4,h,'#b98a4e');
      for(let yy=y0+5; yy<GROUND_Y; yy+=7) px(x+2,yy,w-4,2,'#8a6534'); // weave rows
      for(let xx=x+8; xx<x+w-4; xx+=12) px(xx,y0,2,h,'#8a6534');       // weave cols
      px(x+2,y0,w-4,5,'#caa066');             // rim
      // clothes poking out at the cap
      px(x+6,y0-7,16,9,'#e0e6ec'); px(x+w-24,y0-5,16,8,'#d8b6c0');
    }
  }

  // top furniture: hangs from y=0 down to y1 (cap at the bottom/gap end)
  function drawTop(x, y1, type){
    const w = OB_W;
    if(type==='shelf'){
      // a bracket coming down to a shelf plank, with items sitting on it
      px(x+w/2-4,0,8,y1-12,'#7a5a36');        // bracket
      px(x,y1-12,w,12,'#9c6f38');             // shelf plank
      px(x,y1-12,w,3,'#c79a5e');
      px(x+6,y1-24,7,12,'#b8453f');           // a book standing
      px(x+15,y1-22,6,10,'#3f72a6');
      px(x+w-20,y1-26,12,14,'#cdb98c');       // a vase
      px(x+w-18,y1-30,8,6,'#5f9445');
    } else if(type==='lamp'){
      px(x+w/2-1,0,2,y1-22,'#3a342f');        // cord
      // lampshade as the cap
      for(let i=0;i<22;i++){
        const ww = 14 + i*((w-18)/22);
        px(x+w/2-ww/2, y1-22+i, ww, 1, '#e8c15a');
      }
      px(x+w/2-((14+(w-18))/2)/1, y1-1, 1,1,'#000');
      px(x+8,y1-3,w-16,3,'#caa033');          // shade rim
      px(x+w/2-10,y1-12,20,4,'rgba(255,255,255,.35)'); // glow
    } else { // curtain
      px(x,0,w,y1,'#8aa0b8');
      for(let xx=x+5; xx<x+w; xx+=10){
        px(xx,0,4,y1,'#7890ab');              // folds
        px(xx+4,0,1,y1,'#9fb4ca');
      }
      px(x,0,w,5,'#5f7790');                 // curtain rod shade (top)
      // ruffle cap
      for(let xx=x; xx<x+w; xx+=8){ px(xx,y1-5,8,5,'#9fb4ca'); px(xx,y1,4,3,'#7890ab'); }
    }
  }

  // ---------- background ----------
  let pictureSeed = [ {x:40,w:46,h:34,c:'#9c6f38'}, {x:230,w:38,h:50,c:'#7a5a36'}, {x:430,w:54,h:30,c:'#8a6a44'} ];
  let motes = [];
  for(let i=0;i<14;i++) motes.push({ x:rand()*W, y:rand()*GROUND_Y, s:0.4+rand()*0.8, r:1+(rand()*2|0) });

  function drawBackground(dt){
    // wall
    const wg = ctx.createLinearGradient(0,0,0,GROUND_Y);
    wg.addColorStop(0,'#efe2c4'); wg.addColorStop(1,'#e3d0a9');
    ctx.fillStyle = wg; ctx.fillRect(0,0,W,GROUND_Y);
    // picture rail + lower-wall tint
    px(0,118,W,4,'#cbb488');
    ctx.fillStyle='rgba(150,120,70,.08)'; ctx.fillRect(0,122,W,GROUND_Y-122);
    // slow parallax framed pictures on the wall
    const pOff = (scrollX*0.28) % 520;
    for(let base=-520; base<W+520; base+=520){
      for(const p of pictureSeed){
        const fx = base + p.x - pOff;
        if(fx > W || fx < -p.w) continue;
        px(fx-3, 40-3, p.w+6, p.h+6, '#caa86e');   // frame
        px(fx, 40, p.w, p.h, p.c);
        px(fx+4,44,p.w-8,p.h-8,'rgba(255,255,255,.10)');
      }
    }
    // floating dust motes
    for(const m of motes){
      m.x -= (speed*0.35*m.s)*dt; if(m.x < -4){ m.x = W+4; m.y = rand()*GROUND_Y; }
      px(m.x, m.y, m.r, m.r, 'rgba(255,255,255,.5)');
    }
    // floor
    px(0,GROUND_Y,W,FLOOR_H,'#c8924e');
    px(0,GROUND_Y,W,5,'#e0b072');
    px(0,GROUND_Y+5,W,3,'#a9763a');
    const fOff = scrollX % 48;
    for(let x=-fOff; x<W; x+=48){ px(x,GROUND_Y+8,2,FLOOR_H-8,'#a9763a'); }
    // a rug runner
    px(0,GROUND_Y+FLOOR_H-22,W,22,'#9c5a4a');
    const rOff = scrollX % 36;
    for(let x=-rOff; x<W; x+=36) px(x+6,GROUND_Y+FLOOR_H-18,14,14,'#b87466');
    px(0,GROUND_Y+FLOOR_H-22,W,3,'#7d463a');
  }

  // ---------- game flow ----------
  function reset(){
    birdY = H*0.42; birdV = 0; birdRot = 0; t = 0; scrollX = 0;
    obstacles = []; score = 0; speed = SPEED0; spawnAcc = SPAWN_DX - 40;
    siameseY = birdY; lungeX = 0; deathRot = 0; deathV = 0;
    rng = 12345 + (best*7 + 1);
  }
  function start(){ state='play'; }
  function flap(){
    birdV = FLAP_V;
    birdRot = -0.5;
    sndFlap();
  }
  function spawnObstacle(){
    const gap = Math.max(132, GAP0 - score*1.4);
    const minC = gap/2 + 46, maxC = GROUND_Y - gap/2 - 24;
    const gy = minC + rand()*(maxC-minC);
    obstacles.push({ x:W+10, gy, gap, btype:pick(BTYPES), ttype:pick(TTYPES), scored:false });
  }
  function die(){
    if(state!=='play') return;
    state='dead'; deadAt = t; deathV = -260; deathRot = 0;
    sndCrash(); setTimeout(sndCaught, 180);
    if(score > best){ best = score; localStorage.setItem('zoomies-best', String(best)); }
  }

  // ---------- input ----------
  function press(){
    ensureAudio();
    if(actx && actx.state==='suspended') actx.resume();
    if(state==='ready'){ hide(readyEl); start(); flap(); }
    else if(state==='play'){ flap(); }
    else if(state==='dead'){ if(t - deadAt > 0.6) restart(); }
  }
  const readyEl = document.getElementById('ready');
  const deadEl  = document.getElementById('dead');
  const show = el => el.classList.add('show');
  const hide = el => el.classList.remove('show');
  function restart(){ reset(); hide(deadEl); state='ready'; show(readyEl); }

  document.getElementById('frame').addEventListener('pointerdown', (e)=>{ e.preventDefault(); press(); });
  window.addEventListener('keydown', (e)=>{
    if(e.code==='Space' || e.code==='ArrowUp' || e.code==='KeyW'){ e.preventDefault(); press(); }
  });

  // ---------- update ----------
  function update(dt){
    if(state==='play'){
      t += dt;
      speed = SPEED0 + Math.min(score*2.2, 96);
      scrollX += speed*dt;
      birdV = Math.min(birdV + GRAV*dt, MAX_V);
      birdY += birdV*dt;
      // rotation eases toward velocity-based tilt
      const targetRot = Math.max(-0.5, Math.min(1.5, birdV/520));
      birdRot += (targetRot - birdRot) * Math.min(1, dt*12);
      // pursuer eases toward the tortie's height (reads as "chasing")
      siameseY += (birdY - siameseY) * Math.min(1, dt*2.2);

      // spawn by distance
      spawnAcc += speed*dt;
      if(spawnAcc >= SPAWN_DX){ spawnAcc -= SPAWN_DX; spawnObstacle(); }

      // move + score + cull
      for(const o of obstacles){
        o.x -= speed*dt;
        if(!o.scored && o.x + OB_W < BIRD_X){ o.scored=true; score++; sndScore(); }
      }
      obstacles = obstacles.filter(o => o.x > -OB_W-4);

      // collisions
      const hw = TORTIE_W*0.30, hh = TORTIE_H*0.32;   // forgiving hitbox
      const bx0=BIRD_X-hw, bx1=BIRD_X+hw, by0=birdY-hh, by1=birdY+hh;
      if(by1 >= GROUND_Y){ birdY = GROUND_Y - hh; die(); }
      if(birdY < 4){ birdY = 4; birdV = 0; }
      for(const o of obstacles){
        if(bx1 > o.x && bx0 < o.x+OB_W){
          const gapTop = o.gy - o.gap/2, gapBot = o.gy + o.gap/2;
          if(by0 < gapTop || by1 > gapBot){ die(); break; }
        }
      }
    } else if(state==='dead'){
      t += dt;
      // tortie tumbles down; siamese lunges in for the catch
      deathV = Math.min(deathV + GRAV*dt, MAX_V);
      birdY = Math.min(birdY + deathV*dt, GROUND_Y - 6);
      deathRot += dt*7;
      lungeX = Math.min(1, lungeX + dt*2.6);
      siameseY += (birdY - siameseY) * Math.min(1, dt*4);
      if(t - deadAt > 0.55 && !deadEl.classList.contains('show')){
        document.getElementById('finalScore').textContent = score;
        document.getElementById('bestScore').textContent = best;
        document.getElementById('deadTitle').textContent = score>=10 ? 'SO CLOSE!' : 'CAUGHT!';
        show(deadEl);
      }
    } else { // ready: gentle idle bob
      t += dt; scrollX += 18*dt;
      birdY = H*0.42 + Math.sin(t*3)*7;
      siameseY = birdY + 6;
    }
  }

  // ---------- render ----------
  function render(){
    drawBackground(state==='play' ? 1/60 : 1/120);

    // obstacles
    for(const o of obstacles){
      drawBottom(o.x, o.gy + o.gap/2, o.btype);
      drawTop(o.x, o.gy - o.gap/2, o.ttype);
    }

    // pursuer siamese on the left, galloping, eyes on the tortie
    const legFrame = (Math.floor(t*12)%2===0) ? siamA : siamB;
    const baseSX = 30;
    const sx = baseSX + (state==='dead' ? lungeX*(BIRD_X - baseSX - 8) : 0);
    const sBob = state==='play' ? Math.sin(t*16)*3 : Math.sin(t*5)*2;
    blit(legFrame, sx, siameseY + sBob, SSC, state==='dead' ? lungeX*0.3 : 0, false);

    // tortie (player)
    const tFrame = (Math.floor(t*14)%2===0) ? tortieA : tortieB;
    const rot = state==='dead' ? deathRot : birdRot;
    blit(tFrame, BIRD_X, birdY, TSC, rot, false);

    // score (during play / dead)
    if(state!=='ready') drawNumber(score, W/2, 36, 7);
  }

  // ---------- loop ----------
  let last = 0;
  function frame(ts){
    if(!last) last = ts;
    let dt = (ts - last)/1000; last = ts;
    if(dt > 0.05) dt = 0.05;                  // clamp after tab-out
    update(dt);
    render();
    requestAnimationFrame(frame);
  }
  reset();
  requestAnimationFrame(frame);
})();
</script>
</body>
