<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changelog — The Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <header class="site-head">
    <div class="logo"><a href="index.html">the <span class="mark">playground</span></a></div>
    <span class="tagline">what changed, per game</span>
    <nav class="topnav">
      <a href="index.html">All games</a>
    </nav>
  </header>

  <main>
    <section id="changelog" class="changelog-list">
      <p class="loading">Loading changelog…</p>
    </section>
  </main>

<script>
/* The changelog is game-specific: each game carries its own history in
   games/<slug>/changelog.md, which build.py inlines into games.json. We render
   one section per game so changes are grouped by the game they belong to. */
const root = document.getElementById('changelog');

function section(game) {
  const wrap = document.createElement('article');
  wrap.className = 'cl-game';

  const h = document.createElement('h2');
  const link = document.createElement('a');
  link.href = game.path;
  link.textContent = game.title;
  h.appendChild(link);

  const sub = document.createElement('p');
  sub.className = 'cl-sub';
  sub.textContent = game.tagline || '';

  const body = document.createElement('div');
  body.className = 'cl-body';
  body.innerHTML = marked.parse(game.changelog);

  wrap.append(h, sub, body);
  return wrap;
}

fetch('games.json')
  .then(r => r.json())
  .then(games => {
    const withLogs = games.filter(g => g.changelog && g.changelog.trim());
    root.innerHTML = '';
    if (!withLogs.length) {
      root.innerHTML = '<p class="loading">No changelog entries yet.</p>';
      return;
    }
    withLogs.forEach(g => root.appendChild(section(g)));
  })
  .catch(() => {
    root.innerHTML = '<p class="loading">Could not load the changelog.</p>';
  });
</script>
</body>
</html>
