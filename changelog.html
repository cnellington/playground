<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changelog — The Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <header class="site-head">
    <h1 class="logo"><a href="index.html">THE&nbsp;PLAYGROUND</a></h1>
    <p class="tagline">what changed, and when</p>
    <nav class="topnav">
      <a href="index.html">← Back to games</a>
    </nav>
  </header>

  <main>
    <article id="changelog" class="prose">
      <p class="loading">Loading changelog…</p>
    </article>
  </main>

<script>
/* Render the repo's CHANGELOG.md so there is a single source of truth: the file
   contributors edit in their PR is exactly what shows up here. */
fetch('CHANGELOG.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('changelog').innerHTML = marked.parse(md);
  })
  .catch(() => {
    document.getElementById('changelog').innerHTML = '<p class="loading">Could not load the changelog.</p>';
  });
</script>
</body>
</html>
