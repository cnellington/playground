name: Deploy site

# Builds the site and publishes it to the gh-pages branch whenever main moves.
# GitHub Pages serves gh-pages at https://cnellington.github.io/playground/.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build _site
        run: python3 build.py

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          # Never wipe live PR previews when publishing main.
          clean-exclude: |
            pr-preview/**
