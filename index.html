<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Playground — make games with friends</title>
<meta name="description" content="A little arcade of web games we make for fun.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-head">
    <h1 class="logo">THE&nbsp;PLAYGROUND</h1>
    <p class="tagline">a little arcade of web games we make for fun</p>
    <nav class="topnav">
      <a href="changelog.html">Changelog</a>
      <a href="https://github.com/cnellington/playground">Add a game →</a>
    </nav>
  </header>

  <main>
    <section id="library" class="grid" aria-label="Game library">
      <p class="loading">Loading games…</p>
    </section>
  </main>

  <footer class="site-foot">
    <p>Built for fun. Anyone can add a game — see
      <a href="https://github.com/cnellington/playground/blob/main/CONTRIBUTING.md">how to contribute</a>.</p>
  </footer>

<script>
/* The library renders entirely from games.json, which build.py generates by
   aggregating every games/<slug>/game.json. Adding a game never touches this
   file — that is what keeps merges painless for non-technical contributors. */
const library = document.getElementById('library');

function card(game) {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = game.path;

  const art = document.createElement('div');
  art.className = 'card-art';
  if (game.thumbnail) {
    const img = document.createElement('img');
    img.src = game.path + game.thumbnail;
    img.alt = game.title + ' screenshot';
    img.loading = 'lazy';
    art.appendChild(img);
  } else {
    art.classList.add('emoji');
    art.textContent = game.icon || '🎮';
  }

  const body = document.createElement('div');
  body.className = 'card-body';
  const h = document.createElement('h2');
  h.textContent = game.title;
  const tg = document.createElement('p');
  tg.className = 'card-tagline';
  tg.textContent = game.tagline || '';
  const meta = document.createElement('p');
  meta.className = 'card-meta';
  const authors = (game.authors || []).join(', ');
  meta.textContent = authors ? `by ${authors}` : '';
  body.append(h, tg, meta);

  if (game.tags && game.tags.length) {
    const tags = document.createElement('div');
    tags.className = 'card-tags';
    game.tags.slice(0, 3).forEach(t => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = t;
      tags.appendChild(span);
    });
    body.appendChild(tags);
  }

  a.append(art, body);
  return a;
}

fetch('games.json')
  .then(r => r.json())
  .then(games => {
    library.innerHTML = '';
    if (!games.length) {
      library.innerHTML = '<p class="loading">No games yet. Be the first to add one!</p>';
      return;
    }
    games.forEach(g => library.appendChild(card(g)));
  })
  .catch(() => {
    library.innerHTML = '<p class="loading">Could not load the game list. Try a hard refresh.</p>';
  });
</script>
</body>
</html>
